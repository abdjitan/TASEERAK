            <div class="field" style="margin-bottom:0"><label>خط الطول (Longitude)</label><input class="input num" value="46.6753" dir="ltr"></div>
          </div>
        </div>

        <!-- national address -->

              <div class="field"><label>رقم المبنى</label><input class="input num" value="2929"></div>
              <div class="field"><label>الرقم الإضافي</label><input class="input num" value="7531"></div>

            </div>
            <button class="btn btn-primary btn-block btn-lg2" id="save-loc" style="margin-top:6px">حفظ الموقع</button>
          </div>
        </div>

<script src="assets/shell.js"></script>
<script>
// draggable pin within map
(function () {
  const map = document.querySelector('.map'), pin = document.querySelector('.pin'), ring = document.querySelector('.pulse-ring');
  let drag = false;
  const move = (cx, cy) => {
    const r = map.getBoundingClientRect();
    let x = Math.max(6, Math.min(94, (cx - r.left) / r.width * 100));
    let y = Math.max(10, Math.min(92, (cy - r.top) / r.height * 100));
    pin.style.insetInlineStart = x + '%'; pin.style.top = y + '%';
    ring.style.insetInlineStart = x + '%'; ring.style.top = y + '%';
  };
  pin.addEventListener('mousedown', e => { drag = true; pin.style.cursor = 'grabbing'; e.preventDefault(); });
  window.addEventListener('mousemove', e => { if (drag) move(e.clientX, e.clientY); });
  window.addEventListener('mouseup', () => { drag = false; pin.style.cursor = 'grab'; });
  map.addEventListener('click', e => { if (!e.target.closest('.pin')) move(e.clientX, e.clientY); });
})();
document.getElementById('save-loc').addEventListener('click', () => { var b = document.getElementById('save-loc'); b.textContent = '✓ تم حفظ الموقع'; b.classList.remove('btn-primary'); b.classList.add('btn-navy'); });
</script>
</body>
</html>
