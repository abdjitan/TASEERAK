<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" font-family="Segoe UI, Tahoma, sans-serif">
  <rect width="980" height="600" fill="#f4f6f9"/>
  <text x="28" y="44" fill="#1B2D5B" font-size="20" font-weight="800">📋 New Project RFQ — from a BOQ</text>
  <text x="28" y="68" fill="#7b859c" font-size="13">Upload an Excel BOQ → AI extracts every line, classifies it to an official category, and routes each to its specialist.</text>

  <!-- Upload row -->
  <rect x="28" y="88" width="452" height="70" rx="14" fill="#fff" stroke="#1B2D5B" stroke-dasharray="5 5"/>
  <text x="254" y="120" fill="#1B2D5B" font-size="14" font-weight="700" text-anchor="middle">📊  project-boq.xlsx</text>
  <text x="254" y="142" fill="#6b7280" font-size="12" text-anchor="middle">128 items extracted · ✨ AI-analyzed</text>

  <rect x="496" y="88" width="456" height="70" rx="14" fill="#1B2D5B0a" stroke="#1B2D5B26"/>
  <text x="514" y="116" fill="#1B2D5B" font-size="13" font-weight="700">📑 Project specifications (optional)</text>
  <text x="514" y="138" fill="#6b7280" font-size="11">Reads codes like DRS-701 → fills full item details</text>
  <rect x="800" y="106" width="138" height="34" rx="9" fill="#1B2D5B"/><text x="869" y="128" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">🔎 Read &amp; match</text>

  <!-- Warning banner -->
  <rect x="28" y="172" width="924" height="44" rx="12" fill="#fef2f2" stroke="#fecaca"/>
  <text x="46" y="199" fill="#b91c1c" font-size="13" font-weight="700">⚠️  2 items are not classified — without a category they go to all sector suppliers, not the right specialist.</text>

  <!-- Item: classified -->
  <rect x="28" y="230" width="924" height="64" rx="14" fill="#fff" stroke="#e9edf3"/>
  <rect x="44" y="252" width="18" height="18" rx="4" fill="#1B2D5B"/><text x="53" y="266" fill="#fff" font-size="12" text-anchor="middle">✓</text>
  <text x="78" y="256" fill="#1B2D5B" font-size="14" font-weight="700">Gypsum wall — stud + 1 side lining (125mm)</text>
  <rect x="78" y="266" width="84" height="18" rx="9" fill="#f3e8ff"/><text x="120" y="279" fill="#7c3aed" font-size="10" text-anchor="middle">Architectural</text>
  <rect x="170" y="266" width="150" height="18" rx="9" fill="#eef1f6"/><text x="245" y="279" fill="#374151" font-size="10" text-anchor="middle">→ Gypsum &amp; drywall (gypsum)</text>
  <text x="700" y="270" fill="#6b7280" font-size="12">📦 75 m²</text>
  <rect x="876" y="248" width="60" height="28" rx="8" fill="#fff" stroke="#e5e7eb"/><text x="906" y="266" fill="#6b7280" font-size="12" text-anchor="middle">✏️ edit</text>

  <!-- Item: classified 2 -->
  <rect x="28" y="306" width="924" height="64" rx="14" fill="#fff" stroke="#e9edf3"/>
  <rect x="44" y="328" width="18" height="18" rx="4" fill="#1B2D5B"/><text x="53" y="342" fill="#fff" font-size="12" text-anchor="middle">✓</text>
  <text x="78" y="332" fill="#1B2D5B" font-size="14" font-weight="700">Glass wall — Curtain Wall facade</text>
  <rect x="78" y="342" width="84" height="18" rx="9" fill="#f3e8ff"/><text x="120" y="355" fill="#7c3aed" font-size="10" text-anchor="middle">Architectural</text>
  <rect x="170" y="342" width="170" height="18" rx="9" fill="#eef1f6"/><text x="255" y="355" fill="#374151" font-size="10" text-anchor="middle">→ Curtain wall &amp; glazing</text>
  <text x="700" y="346" fill="#6b7280" font-size="12">📦 126 m²</text>
  <rect x="876" y="324" width="60" height="28" rx="8" fill="#fff" stroke="#e5e7eb"/><text x="906" y="342" fill="#6b7280" font-size="12" text-anchor="middle">✏️ edit</text>

  <!-- Item: UNCLASSIFIED (expanded edit) -->
  <rect x="28" y="382" width="924" height="186" rx="14" fill="#fff" stroke="#fecaca"/>
  <text x="46" y="410" fill="#1B2D5B" font-size="14" font-weight="700">Active Harmonic Filter; 200 A</text>
  <rect x="44" y="420" width="220" height="18" rx="9" fill="#fee2e2"/><text x="154" y="433" fill="#b91c1c" font-size="10" font-weight="700" text-anchor="middle">⚠ Unclassified — set category</text>

  <text x="46" y="466" fill="#6b7280" font-size="11" font-weight="700">Category (routing) *</text>
  <rect x="46" y="474" width="440" height="34" rx="9" fill="#fef2f2" stroke="#fecaca"/>
  <text x="62" y="496" fill="#b91c1c" font-size="12">— Pick a category from the list —  ▾</text>

  <text x="510" y="466" fill="#6b7280" font-size="11" font-weight="700">Sector</text>
  <rect x="510" y="474" width="200" height="34" rx="9" fill="#fff" stroke="#e5e7eb"/>
  <text x="526" y="496" fill="#374151" font-size="12">Electrical  ▾</text>

  <text x="730" y="466" fill="#6b7280" font-size="11" font-weight="700">Qty</text>
  <rect x="730" y="474" width="90" height="34" rx="9" fill="#fff" stroke="#e5e7eb"/><text x="746" y="496" fill="#374151" font-size="12">1</text>
  <rect x="828" y="474" width="108" height="34" rx="9" fill="#fff" stroke="#e5e7eb"/><text x="844" y="496" fill="#374151" font-size="12">No. ▾</text>

  <text x="46" y="540" fill="#b91c1c" font-size="11">Without a category it goes to all suppliers in the sector (less precise). Pick the right one to reach the specialist.</text>

  <text x="28" y="592" fill="#aab2c4" font-size="10">Mockup · BOQ AI classification &amp; routing (illustrative)</text>
</svg>
