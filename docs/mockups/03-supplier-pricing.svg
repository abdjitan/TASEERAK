<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" font-family="Segoe UI, Tahoma, sans-serif">
  <rect width="980" height="600" fill="#f4f6f9"/>
  <text x="28" y="42" fill="#1B2D5B" font-size="20" font-weight="800">Supplier — price each material (click to price)</text>
  <text x="28" y="65" fill="#7b859c" font-size="13">A supplier sees ONLY materials in their specialty · partial pricing allowed · contractor identity hidden until accepted.</text>

  <!-- Privacy + deadline strip -->
  <rect x="28" y="84" width="600" height="40" rx="10" fill="#fff" stroke="#e9edf3"/>
  <text x="44" y="109" fill="#374151" font-size="12">🏢 Contractor · Riyadh — Al Olaya  🔒 revealed when your offer is accepted</text>
  <rect x="644" y="84" width="308" height="40" rx="10" fill="#fff7ef" stroke="#F5831F66"/>
  <text x="660" y="109" fill="#d96f15" font-size="12" font-weight="700">⏰ Time left to price: 23h 10m</text>

  <!-- Item 1 collapsed (priced) -->
  <rect x="28" y="138" width="924" height="56" rx="14" fill="#fff" stroke="#e9edf3"/>
  <circle cx="56" cy="166" r="12" fill="#0F6E56"/><text x="56" y="171" fill="#fff" font-size="12" text-anchor="middle">✓</text>
  <text x="80" y="162" fill="#1B2D5B" font-size="14" font-weight="700">Ready-Mix Concrete C35</text>
  <text x="80" y="180" fill="#6b7280" font-size="11">Concrete (readymix) · 320 m³</text>
  <text x="888" y="172" fill="#0F6E56" font-size="15" font-weight="800" text-anchor="end">91,200 SAR</text>

  <!-- Item 2 EXPANDED (pricing form) -->
  <rect x="28" y="206" width="924" height="300" rx="14" fill="#fff" stroke="#F5831F88"/>
  <circle cx="56" cy="234" r="12" fill="#eef1f6"/><text x="56" y="239" fill="#9ca3af" font-size="12" text-anchor="middle">2</text>
  <text x="80" y="230" fill="#1B2D5B" font-size="14" font-weight="700">Rebar B500B — Ø16</text>
  <text x="80" y="248" fill="#6b7280" font-size="11">Steel (rebar) · 84 ton</text>

  <!-- required spec box -->
  <rect x="48" y="266" width="884" height="44" rx="10" fill="#F5831F0a" stroke="#F5831F44"/>
  <text x="64" y="286" fill="#d96f15" font-size="11" font-weight="700">📋 Specifications required by the contractor</text>
  <text x="64" y="303" fill="#374151" font-size="12">Grade B500B, deformed, SASO certified, mill test report required.</text>

  <text x="48" y="336" fill="#6b7280" font-size="11" font-weight="700">💰 Total price for this material (for 84 ton) *</text>
  <rect x="48" y="344" width="560" height="34" rx="9" fill="#fff" stroke="#e5e7eb"/><text x="64" y="366" fill="#1B2D5B" font-size="13" font-weight="700">221,760</text>
  <rect x="624" y="344" width="150" height="34" rx="9" fill="#fff" stroke="#e5e7eb"/><text x="640" y="366" fill="#9ca3af" font-size="12">+ unit price ▾</text>

  <text x="48" y="402" fill="#6b7280" font-size="11" font-weight="700">⏱ Delivery time for this material (days)</text>
  <rect x="48" y="410" width="200" height="34" rx="9" fill="#fff" stroke="#e5e7eb"/><text x="64" y="432" fill="#1B2D5B" font-size="13">5</text>

  <text x="270" y="402" fill="#6b7280" font-size="11" font-weight="700">📝 Material specification / brand</text>
  <rect x="270" y="410" width="338" height="34" rx="9" fill="#fff" stroke="#e5e7eb"/><text x="286" y="432" fill="#9ca3af" font-size="12">Origin, brand, grade…</text>

  <rect x="624" y="410" width="150" height="34" rx="9" fill="#fff" stroke="#e5e7eb" stroke-dasharray="4 4"/><text x="699" y="431" fill="#6b7280" font-size="12" text-anchor="middle">📤 catalog</text>

  <rect x="48" y="458" width="160" height="36" rx="10" fill="#0F6E56"/><text x="128" y="481" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">✓ Save material</text>
  <text x="228" y="481" fill="#9ca3af" font-size="11">You can price some items and send — no need to price all.</text>

  <!-- Item 3 collapsed (+ price) -->
  <rect x="28" y="518" width="924" height="52" rx="14" fill="#fff" stroke="#e9edf3"/>
  <circle cx="56" cy="544" r="12" fill="#eef1f6"/><text x="56" y="549" fill="#9ca3af" font-size="12" text-anchor="middle">3</text>
  <text x="80" y="540" fill="#1B2D5B" font-size="14" font-weight="700">Waterproofing membrane</text>
  <text x="80" y="557" fill="#6b7280" font-size="11">Waterproofing · 8,200 m²</text>
  <rect x="852" y="528" width="84" height="32" rx="9" fill="#F5831F10"/><text x="894" y="549" fill="#d96f15" font-size="11" font-weight="700" text-anchor="middle">+ Price</text>

  <text x="28" y="592" fill="#aab2c4" font-size="10">Mockup · Supplier per-item pricing accordion (illustrative)</text>
</svg>
