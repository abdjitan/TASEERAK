    <rect x="204" y="132" width="168" height="86" rx="14" fill="#fff" stroke="#e9edf3"/>
    <rect x="220" y="148" width="34" height="34" rx="9" fill="#F5831F22"/><text x="237" y="170" font-size="15" text-anchor="middle">⏳</text>
    <text x="356" y="166" fill="#1B2D5B" font-size="22" font-weight="800" text-anchor="end">37</text>
    <text x="220" y="206" fill="#6b7280" font-size="12">Offers received</text>

    <rect x="384" y="132" width="168" height="86" rx="14" fill="#fff" stroke="#e9edf3"/>
    <rect x="400" y="148" width="34" height="34" rx="9" fill="#0F6E5622"/><text x="417" y="170" font-size="15" text-anchor="middle">✅</text>
    <text x="536" y="166" fill="#1B2D5B" font-size="22" font-weight="800" text-anchor="end">8</text>
    <text x="400" y="206" fill="#6b7280" font-size="12">Awarded</text>

    <rect x="564" y="132" width="172" height="86" rx="14" fill="#fff" stroke="#e9edf3"/>
    <rect x="580" y="148" width="34" height="34" rx="9" fill="#1B2D5B16"/><text x="597" y="170" font-size="15" text-anchor="middle">💰</text>
    <text x="720" y="166" fill="#1B2D5B" font-size="20" font-weight="800" text-anchor="end">1.2M</text>
    <text x="580" y="206" fill="#6b7280" font-size="12">SAR sourced</text>
