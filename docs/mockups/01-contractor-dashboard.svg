<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" font-family="Segoe UI, Tahoma, sans-serif">
  <rect width="980" height="600" fill="#f4f6f9"/>
  <!-- Sidebar (RTL: right side) -->
  <rect x="760" y="0" width="220" height="600" fill="#1B2D5B"/>
  <text x="870" y="44" fill="#fff" font-size="20" font-weight="700" text-anchor="middle">تسعيرك · Taseerak</text>
  <rect x="784" y="78" width="172" height="38" rx="10" fill="#ffffff22"/>
  <rect x="788" y="86" width="4" height="22" rx="2" fill="#F5831F"/>
  <text x="940" y="103" fill="#fff" font-size="14" text-anchor="end">Dashboard</text>
  <text x="940" y="150" fill="#b9c2da" font-size="14" text-anchor="end">New RFQ</text>
  <text x="940" y="190" fill="#b9c2da" font-size="14" text-anchor="end">Project (BOQ)</text>
  <text x="940" y="230" fill="#b9c2da" font-size="14" text-anchor="end">Orders</text>
  <text x="940" y="270" fill="#b9c2da" font-size="14" text-anchor="end">Messages</text>
  <text x="940" y="310" fill="#b9c2da" font-size="14" text-anchor="end">Market</text>

  <!-- Topbar -->
  <rect x="0" y="0" width="760" height="58" fill="#ffffff"/>
