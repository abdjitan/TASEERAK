    <text x="476" y="320" fill="#0F6E56" font-size="11" font-weight="700" text-anchor="end">▼ 2%</text>

    <rect x="504" y="276" width="216" height="60" rx="12" fill="#f6f8fb"/>
    <text x="518" y="298" fill="#1B2D5B" font-size="12" font-weight="700">Gypsum board</text>
    <text x="518" y="320" fill="#0F6E56" font-size="16" font-weight="800">23 SAR/m²</text>
    <text x="708" y="320" fill="#9ca3af" font-size="11" font-weight="700" text-anchor="end">◆ stable</text>
  </g>

  <!-- Action center -->
  <rect x="24" y="366" width="712" height="44" rx="12" fill="#fff7ef" stroke="#F5831F66"/>
  <text x="40" y="393" fill="#1B2D5B" font-size="13" font-weight="700">🔔 5 requests got new offers — compare now →</text>

  <!-- RFQ cards -->
  <rect x="24" y="424" width="712" height="76" rx="14" fill="#fff" stroke="#e9edf3"/>
  <rect x="40" y="440" width="40" height="40" rx="11" fill="#1B2D5B14"/><text x="60" y="466" font-size="17" text-anchor="middle">📦</text>
  <text x="92" y="452" fill="#1B2D5B" font-size="14" font-weight="700">RFQ-1042 · Energy Centre — supply package</text>
  <rect x="92" y="462" width="70" height="18" rx="9" fill="#e8f0ff"/><text x="127" y="475" fill="#1B2D5B" font-size="10" text-anchor="middle">Civil</text>
  <rect x="170" y="462" width="64" height="18" rx="9" fill="#e7f6ef"/><text x="202" y="475" fill="#0F6E56" font-size="10" text-anchor="middle">Open</text>
  <rect x="242" y="462" width="92" height="18" rx="9" fill="#fff1e6"/><text x="288" y="475" fill="#d96f15" font-size="10" text-anchor="middle">⏰ 23h 10m</text>
  <rect x="648" y="440" width="72" height="40" rx="11" fill="#F5831F"/><text x="684" y="465" fill="#fff" font-size="16" font-weight="800" text-anchor="middle">9</text>

  <rect x="24" y="510" width="712" height="76" rx="14" fill="#fff" stroke="#e9edf3"/>
  <rect x="40" y="526" width="40" height="40" rx="11" fill="#1B2D5B14"/><text x="60" y="552" font-size="17" text-anchor="middle">📦</text>
  <text x="92" y="538" fill="#1B2D5B" font-size="14" font-weight="700">RFQ-1041 · Glass facade — Curtain Wall</text>
  <rect x="92" y="548" width="92" height="18" rx="9" fill="#f3e8ff"/><text x="138" y="561" fill="#7c3aed" font-size="10" text-anchor="middle">Architectural</text>
  <rect x="648" y="526" width="72" height="40" rx="11" fill="#eef1f6"/><text x="684" y="551" fill="#9ca3af" font-size="11" font-weight="700" text-anchor="middle">Awaiting</text>

  <text x="24" y="596" fill="#aab2c4" font-size="10">Mockup · Taseerak contractor dashboard (illustrative, not a live screenshot)</text>
</svg>
