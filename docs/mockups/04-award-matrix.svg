<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" font-family="Segoe UI, Tahoma, sans-serif">
  <rect width="980" height="600" fill="#f4f6f9"/>
  <text x="28" y="42" fill="#1B2D5B" font-size="20" font-weight="800">🧱 Per-item award matrix</text>
  <text x="28" y="65" fill="#7b859c" font-size="13">Award each material to the best supplier — one request can split across several. Sort by cheapest / fastest / nearest.</text>

  <!-- Sort toggle -->
  <rect x="700" y="34" width="252" height="34" rx="10" fill="#eef1f6"/>
  <rect x="704" y="38" width="80" height="26" rx="8" fill="#fff"/><text x="744" y="55" fill="#1B2D5B" font-size="12" font-weight="700" text-anchor="middle">💰 Cheapest</text>
  <text x="820" y="55" fill="#6b7280" font-size="12" text-anchor="middle">⚡ Fastest</text>
  <text x="912" y="55" fill="#6b7280" font-size="12" text-anchor="middle">📍 Nearest</text>

  <!-- Material card -->
  <rect x="28" y="92" width="924" height="234" rx="14" fill="#fff" stroke="#e9edf3"/>
  <rect x="28" y="92" width="924" height="40" rx="14" fill="#f6f8fb"/>
  <text x="46" y="118" fill="#1B2D5B" font-size="14" font-weight="700">Ready-Mix Concrete C35 · 320 m³</text>
  <text x="930" y="118" fill="#9ca3af" font-size="12" text-anchor="end">3 bids</text>

  <!-- Bid 1 (winner) -->
  <rect x="28" y="132" width="924" height="62" fill="#ecfdf3"/>
  <text x="50" y="160" font-size="15">🥇</text>
  <text x="76" y="158" fill="#1B2D5B" font-size="14" font-weight="700">Al-Rajhi Ready Mix</text>
  <text x="200" y="158" fill="#0F6E56" font-size="12">🛡 verified</text>
  <text x="280" y="158" fill="#9ca3af" font-size="11">⭐ 4.8</text>
  <text x="76" y="178" fill="#6b7280" font-size="11">285 / m³ · 📦 4 days · 📍 Riyadh · 📏 12 km · ⚙️ C35, SASO · 📎 catalog · details →</text>
  <text x="848" y="166" fill="#1B2D5B" font-size="15" font-weight="800" text-anchor="end">91,200 SAR</text>
  <rect x="864" y="150" width="72" height="28" rx="9" fill="#0F6E56"/><text x="900" y="169" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Award</text>

  <!-- Bid 2 -->
  <line x1="40" y1="194" x2="940" y2="194" stroke="#eef1f6"/>
  <text x="76" y="222" fill="#1B2D5B" font-size="14" font-weight="700">United Concrete Co.</text>
  <text x="210" y="222" fill="#9ca3af" font-size="11">⭐ 4.5</text>
  <text x="76" y="242" fill="#6b7280" font-size="11">291 / m³ · 📦 3 days · 📍 Riyadh · 📏 19 km · details →</text>
  <text x="848" y="230" fill="#1B2D5B" font-size="14" font-weight="700" text-anchor="end">93,120 SAR</text>
  <rect x="864" y="214" width="72" height="28" rx="9" fill="#fff" stroke="#e5e7eb"/><text x="900" y="233" fill="#6b7280" font-size="12" text-anchor="middle">Award</text>

  <!-- Bid 3 -->
  <line x1="40" y1="258" x2="940" y2="258" stroke="#eef1f6"/>
  <text x="76" y="286" fill="#1B2D5B" font-size="14" font-weight="700">Gulf Mix Plant</text>
  <text x="76" y="306" fill="#6b7280" font-size="11">296 / m³ · 📦 6 days · 📍 Kharj · 📏 41 km · details →</text>
  <text x="848" y="294" fill="#1B2D5B" font-size="14" font-weight="700" text-anchor="end">94,720 SAR</text>
  <rect x="864" y="278" width="72" height="28" rx="9" fill="#fff" stroke="#e5e7eb"/><text x="900" y="297" fill="#6b7280" font-size="12" text-anchor="middle">Award</text>

  <!-- Second material (collapsed summary) -->
  <rect x="28" y="342" width="924" height="60" rx="14" fill="#fff" stroke="#e9edf3"/>
  <text x="46" y="368" fill="#1B2D5B" font-size="14" font-weight="700">Rebar B500B Ø16 · 84 ton</text>
  <rect x="46" y="378" width="92" height="18" rx="9" fill="#e7f6ef"/><text x="92" y="391" fill="#0F6E56" font-size="10" text-anchor="middle">✓ Awarded</text>
  <text x="700" y="378" fill="#6b7280" font-size="12">🥇 Saudi Steel · 221,760 SAR</text>

  <!-- Finalize bar -->
  <rect x="28" y="418" width="924" height="64" rx="14" fill="#1B2D5B"/>
  <text x="46" y="446" fill="#fff" font-size="14" font-weight="700">2 of 6 materials awarded across 2 suppliers</text>
  <text x="46" y="466" fill="#b9c2da" font-size="12">Finalize to generate per-supplier purchase orders + ZATCA tax invoices.</text>
  <rect x="760" y="432" width="176" height="36" rx="10" fill="#F5831F"/><text x="848" y="455" fill="#fff" font-size="13" font-weight="800" text-anchor="middle">Finalize awards →</text>

  <text x="28" y="520" fill="#6b7280" font-size="12">Classification per bid: cheapest (price) · fastest (per-item delivery) · nearest (haversine distance to delivery point).</text>
  <text x="28" y="540" fill="#6b7280" font-size="12">Click any supplier → full breakdown + sent spec + “request price reduction” / “request more info”.</text>

  <text x="28" y="592" fill="#aab2c4" font-size="10">Mockup · Per-item award matrix (illustrative)</text>
</svg>
